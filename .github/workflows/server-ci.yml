name: Server CI

on:
  push:
    paths:
      - 'server/**'
      - '.github/workflows/server-ci.yml'
  pull_request:
    paths:
      - 'server/**'
      - '.github/workflows/server-ci.yml'

jobs:
  test:
    # Remove the next line (or set to true) to re-enable Jest on every push/PR.
    if: false
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: spin_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d spin_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      # GitHub is moving JS actions to Node 24; opt in so checkout/setup-node stay supported.
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      # Prisma CLI + Jest both need a test DB; jestSetupEnv maps DATABASE_URL_TEST → DATABASE_URL for the app.
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/spin_test
      DATABASE_URL_TEST: postgresql://postgres:postgres@localhost:5432/spin_test
      JWT_SECRET: ci-jwt-secret-for-functional-tests
      NODE_ENV: test

    defaults:
      run:
        working-directory: server

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Prisma migrate (test database)
        run: npx prisma migrate deploy

      - name: Run tests (serial — shared DB for functional suites)
        run: npm test
